name: SonarQube

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    name: Build and analyze
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: zulu

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Cache Sonar scanner
        id: cache-sonar
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}\sonar-scanner
          key: sonar-scanner-${{ runner.os }}

      - name: Install Sonar scanner
        if: steps.cache-sonar.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          New-Item -ItemType Directory -Path "${{ runner.temp }}\sonar-scanner" -Force
          dotnet tool update dotnet-sonarscanner --tool-path "${{ runner.temp }}\sonar-scanner"

      - name: Begin Sonar analysis
        shell: powershell
        run: |
          ${{ runner.temp }}\sonar-scanner\dotnet-sonarscanner begin `
            /k:"Zavsek_DiplomskaNaloga-Faza1" `
            /o:"zavsek" `
            /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

      - name: Build solution
        shell: powershell
        run: |
          # BUILD CELEGA REPOJA NAENKRAT
          dotnet build --configuration Release

      - name: End Sonar analysis
        shell: powershell
        run: |
          ${{ runner.temp }}\sonar-scanner\dotnet-sonarscanner end `
            /d:sonar.token="${{ secrets.SONAR_TOKEN }}"