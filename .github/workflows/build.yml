name: SonarQube analiza po poskusih

on: [push, workflow_dispatch]

jobs:
  analyze:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        folder:
          - Codex5.3/Poskus1
          - Codex5.3/Poskus2
          - Codex5.3/Poskus3
          - Gemini3.1/Poskus1
          - Gemini3.1/Poskus2
          - Gemini3.1/Poskus3
          - Sonnet4.6/Poskus1
          - Sonnet4.6/Poskus2
          - Sonnet4.6/Poskus3
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install sonarscanner
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Nastavi project key
        id: vars
        run: |
          KEY=$(echo "${{ matrix.folder }}" | tr '/' '-' | tr '.' '-')
          echo "key=llm-compare-$KEY" >> $GITHUB_OUTPUT

      - name: Sonar begin
        working-directory: ${{ matrix.folder }}
        run: >
          dotnet sonarscanner begin
          /k:"${{ steps.vars.outputs.key }}"
          /d:sonar.host.url="${{ secrets.SONAR_HOST_URL }}"
          /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

      - name: Build
        working-directory: ${{ matrix.folder }}
        run: dotnet build *.slnx

      - name: Sonar end
        working-directory: ${{ matrix.folder }}
        run: dotnet sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"