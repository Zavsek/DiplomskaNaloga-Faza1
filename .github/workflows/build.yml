name: SonarQube

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    name: Build and analyze
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: zulu

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install Sonar scanner
        shell: powershell
        run: |
          dotnet tool update dotnet-sonarscanner --tool-path $env:RUNNER_TEMP\scanner

      - name: Begin Sonar
        shell: powershell
        run: |
          $env:RUNNER_TEMP\scanner\dotnet-sonarscanner begin `
            /k:"Zavsek_DiplomskaNaloga-Faza1" `
            /o:"zavsek" `
            /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

      - name: Build all experiments
        shell: powershell
        run: |
          $mape = @("Codex5.3", "Gemini3.1", "Sonnet4.6")

          foreach ($m in $mape) {

            Write-Host "====================================="
            Write-Host "Buildam mapo: $m"
            Write-Host "====================================="

            Get-ChildItem -Path $m -Recurse -Filter *.slnx |
              Where-Object { $_.FullName -notmatch "\\Template\\" } |
              ForEach-Object {

                Write-Host "Build: $($_.FullName)"
                dotnet build $_.FullName --configuration Release
              }
          }

      - name: End Sonar
        shell: powershell
        run: |
          $env:RUNNER_TEMP\scanner\dotnet-sonarscanner end `
            /d:sonar.token="${{ secrets.SONAR_TOKEN }}"