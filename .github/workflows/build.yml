name: SonarCloud analiza

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    name: Build and analyze
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~\sonar\cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache SonarCloud scanner
        id: cache-sonar-scanner
        uses: actions/cache@v4
        with:
          path: .\.sonar\scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner

      - name: Install SonarCloud scanner
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          New-Item -Path .\.sonar\scanner -ItemType Directory
          dotnet tool update dotnet-sonarscanner --tool-path .\.sonar\scanner

      - name: Dodaj unikatne ProjectGuid v .csproj datoteke
        shell: powershell
        run: |
          Write-Host "=========================================="
          Write-Host "Dodajam unikatne ProjectGuid-e..."
          Write-Host "=========================================="

          $csprojDatoteke = Get-ChildItem -Path . -Recurse -Filter *.csproj -File |
              Where-Object { $_.FullName -notmatch "\\Template\\" }

          foreach ($datoteka in $csprojDatoteke) {
              [xml]$xml = Get-Content $datoteka.FullName -Raw
              $novGuid = "{" + [guid]::NewGuid().ToString().ToUpper() + "}"

              # odstrani obstoječi ProjectGuid, če po naključju obstaja
              $obstojeci = $xml.Project.PropertyGroup | Where-Object { $_.ProjectGuid }
              if ($obstojeci) {
                  foreach ($pg in $obstojeci) {
                      $pg.RemoveChild($pg.ProjectGuid) | Out-Null
                  }
              }

              # dodaj nov ProjectGuid v prvo PropertyGroup
              $prviPropertyGroup = $xml.Project.PropertyGroup | Select-Object -First 1
              if (-not $prviPropertyGroup) {
                  $prviPropertyGroup = $xml.CreateElement("PropertyGroup")
                  $xml.Project.AppendChild($prviPropertyGroup) | Out-Null
              }

              $guidElement = $xml.CreateElement("ProjectGuid")
              $guidElement.InnerText = $novGuid
              $prviPropertyGroup.AppendChild($guidElement) | Out-Null

              $xml.Save($datoteka.FullName)
              Write-Host "Dodan ProjectGuid $novGuid v: $($datoteka.FullName)"
          }

      - name: Build and analyze
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        shell: powershell
        run: |
          # 1. ZAČETEK: Aktivacija skenerja
          Write-Host "=========================================="
          Write-Host "Zaganjam SonarCloud analizo"
          Write-Host "=========================================="

          .\.sonar\scanner\dotnet-sonarscanner begin /k:"Zavsek_DiplomskaNaloga-Faza1" /o:"zavsek" /d:sonar.token="$env:SONAR_TOKEN"

          $glavneMape = @("Codex5.3", "Gemini3.1", "Sonnet4.6")

          # 2. GRADNJA: Sprehod skozi vse .slnx datoteke
          foreach ($mapa in $glavneMape) {
              if (Test-Path $mapa) {
                  Write-Host "=========================================="
                  Write-Host "Vstopam v mapo: $mapa"
                  Write-Host "=========================================="

                  Get-ChildItem -Path $mapa -Recurse -Filter *.slnx | ForEach-Object {
                      Write-Host "--> ZAGON GRADNJE: $($_.Name)"
                      try {
                          dotnet build $_.FullName -v:q --no-incremental
                      } catch {
                          Write-Host "[OPOZORILO] Gradnja za $($_.Name) je spodletela, nadaljujemo z ostalimi..."
                      }
                  }
              }
          }

          # 3. KONEC: Pošiljanje podatkov na SonarCloud
          .\.sonar\scanner\dotnet-sonarscanner end /d:sonar.token="$env:SONAR_TOKEN"
