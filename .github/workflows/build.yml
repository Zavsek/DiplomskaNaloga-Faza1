name: SonarQube
on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    name: Build and analyze
    runs-on: windows-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Cache SonarQube Cloud packages
        uses: actions/cache@v4
        with:
          path: ~\sonar\cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache SonarQube Cloud scanner
        id: cache-sonar-scanner
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}\scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner

      - name: Install SonarQube Cloud scanner
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          New-Item -Path ${{ runner.temp }}\scanner -ItemType Directory
          dotnet tool update dotnet-sonarscanner --tool-path ${{ runner.temp }}\scanner

      - name: Build and analyze
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        shell: powershell
        run: |
          # 1. ZAČETEK: Aktivacija skenerja
          ${{ runner.temp }}\scanner\dotnet-sonarscanner begin /k:"Zavsek_DiplomskaNaloga-Faza1" /o:"zavsek" /d:sonar.token="${{ secrets.SONAR_TOKEN }}"
          
          # 2. SREDINA: Eksplicitno ciljanje tvojih map (mapo /template popolnoma ignoriramo)
          $glavneMape = @("Codex5.3", "Gemini3.1", "Sonnet4.6")
          
          foreach ($mapa in $glavneMape) {
              if (Test-Path $mapa) {
                  Write-Host "=========================================="
                  Write-Host "Vstopam v mapo in iščem poskuse: $mapa"
                  Write-Host "=========================================="
                  
                  # Poišči vse .slnx datoteke znotraj te specifične mape (Poskus1, Poskus2, Poskus3)
                  Get-ChildItem -Path $mapa -Recurse -Filter *.slnx | ForEach-Object {
                      Write-Host "--> ZAGON GRADNJE: $($_.Name) ($($_.FullName))"
                      dotnet build $_.FullName
                  }
              } else {
                  Write-Host "!!! OPOZORILO: Mapa '$mapa' ne obstaja v korenu repozitorija. Preveri črkovanje/velike tiskane črke !!!"
              }
          }
          
          # 3. KONEC: Zaključek analize in pošiljanje na SonarCloud
          ${{ runner.temp }}\scanner\dotnet-sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"